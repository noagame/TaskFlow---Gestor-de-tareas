<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { padding-top: 40px; }
        .tarea-completada { text-decoration: line-through; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-4">TaskFlow - Gestor de Tareas</h1>

    <form id="form-tarea" class="mb-3">
        <div class="form-row">
            <div class="col-6 mb-2">
                <input type="text" id="descripcion" class="form-control" placeholder="Descripción de la tarea" required>
            </div>
            <div class="col-3 mb-2">
                <input type="datetime-local" id="fechaInicio" class="form-control" placeholder="Inicio">
            </div>
            <div class="col-3 mb-2">
                <input type="datetime-local" id="fechaFin" class="form-control" placeholder="Fin">
            </div>
            <div class="col-12 mb-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="esDiaria">
                    <label class="form-check-label" for="esDiaria">Tarea diaria</label>
                </div>
            </div>
            <div class="col-12">
                <button class="btn btn-primary btn-block" type="submit">Agregar tarea</button>
            </div>
        </div>
    </form>

    <ul id="lista-tareas" class="list-group"></ul>

    <div id="notificacion" class="alert alert-info mt-3 d-none"></div>
</div>

<!-- jQuery and Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script src="scripts/script.js"></script>
</body>
</html>
